<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<style>
        body {
            background-color: #0D0D0D;
            color: #e5e2e1;
            overflow-x: hidden;
        }

        .neon-glow {
            box-shadow: 0 0 15px rgba(217, 255, 0, 0.15);
        }

        .glass-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid #2A2A2A;
        }

        .login-input {
            background-color: #121212;
            border: 1px solid #2A2A2A;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-input:focus {
            border-color: #D9FF00;
            box-shadow: 0 0 0 2px rgba(217, 255, 0, 0.2);
            outline: none;
        }

        @keyframes subtle-pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.02); }
        }

        .ambient-bg {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(217, 255, 0, 0.05) 0%, transparent 70%);
            z-index: -1;
            filter: blur(60px);
            animation: subtle-pulse 8s infinite ease-in-out;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
<!-- Atmospheric Background Elements -->
<div class="ambient-bg top-[-10%] right-[-10%]"></div>
<div class="ambient-bg bottom-[-10%] left-[-10%]" style="animation-delay: -4s;"></div>
<!-- Main Container -->
<main class="w-full max-w-[480px] px-6 py-12">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-12 animate-fade-in">
<div class="bg-neon-lime p-3 rounded-xl mb-4 transform -rotate-12 neon-glow">
<span class="material-symbols-outlined text-surface-black text-4xl" style="font-variation-settings: 'FILL' 1;">
                    bolt
                </span>
</div>
<h1 class="font-headline-lg text-headline-lg tracking-tighter text-white">
                SHOW OFF
            </h1>
<p class="font-label-md text-label-md text-neon-lime uppercase tracking-widest mt-1">
                Management System
            </p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-[40px] p-10 md:p-12 shadow-2xl relative overflow-hidden">
<!-- Contextual Decorative Element -->
<div class="absolute top-0 right-0 p-8 opacity-10">
<span class="material-symbols-outlined text-8xl">verified_user</span>
</div>
<div class="relative z-10">
<div class="mb-10">
<h2 class="font-headline-md text-headline-md text-white mb-2">Welcome Back</h2>
<p class="font-body-md text-body-md text-text-muted">Enter your credentials to access your store dashboard.</p>
</div>
<form action="#" class="space-y-6" id="loginForm">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-white block ml-1" for="email">WORK EMAIL</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-text-muted text-[20px]">
                                mail
                            </span>
<input class="login-input w-full rounded-2xl py-4 pl-12 pr-4 font-body-md text-body-md text-white placeholder-text-muted/50" id="email" name="email" placeholder="evano@showoff.style" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="font-label-md text-label-md text-white block" for="password">PASSWORD</label>
<a class="font-label-md text-label-md text-neon-lime hover:underline transition-all" href="#">FORGOT?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-text-muted text-[20px]">
                                lock
                            </span>
<input class="login-input w-full rounded-2xl py-4 pl-12 pr-12 font-body-md text-body-md text-white placeholder-text-muted/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-text-muted hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-3 ml-1">
<input class="w-5 h-5 rounded border-surface-variant bg-surface-black text-neon-lime focus:ring-neon-lime focus:ring-offset-surface-black" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-text-muted cursor-pointer select-none" for="remember">Remember this session</label>
</div>
<!-- Primary Action -->
<button class="w-full bg-neon-lime hover:bg-[#e6ff4d] active:scale-[0.98] transition-all py-5 rounded-2xl font-headline-md text-headline-md text-surface-black flex items-center justify-center gap-2 mt-4" type="submit">
<span>Login to SHOW OFF Dashboard</span>
<span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
</form>
<!-- Footer Text -->
<div class="mt-12 text-center">
<p class="font-body-md text-body-md text-text-muted">
                        Unauthorized access is strictly monitored. 
                        <br/>
<a class="text-white hover:text-neon-lime underline underline-offset-4 transition-colors" href="#">Contact Support</a>
</p>
</div>
</div>
</div>
<!-- System Status Bar -->
<div class="mt-8 flex items-center justify-center gap-6 animate-fade-in opacity-50">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-neon-lime"></div>
<span class="font-label-md text-label-md">SYSTEM ONLINE</span>
</div>
<div class="w-px h-3 bg-surface-variant"></div>
<div class="flex items-center gap-2">
<span class="font-label-md text-label-md">V 2.4.0</span>
</div>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Loading state
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-surface-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Authorizing...</span>
            `;

            // Mock redirect delay
            setTimeout(() => {
                btn.innerHTML = `
                    <span class="material-symbols-outlined">check_circle</span>
                    <span>Redirecting...</span>
                `;
                btn.classList.replace('bg-neon-lime', 'bg-status-blue');
                setTimeout(() => {
                    // Logic would go here to navigate to dashboard
                    console.log('Redirecting to dashboard');
                }, 800);
            }, 1500);
        });

        // Simple visibility toggle
        const toggleBtn = document.querySelector('button[type="button"]');
        const passInput = document.getElementById('password');
        toggleBtn.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            toggleBtn.querySelector('span').innerText = isPass ? 'visibility_off' : 'visibility';
        });
    </script>
</body></html>
